<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Inter 字体 -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #2F6BFF;
      --color-primary-container:    #D6E3FF;
      --color-on-primary:           #FFFFFF;
      /* === 背景 / 表面 === */
      --color-background:                 #F6F8FB;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EEF1F6;
      --color-surface-container-high:     #E6EAF2;
      --color-surface-container-highest:  #DEE4EE;
      /* === 文字 === */
      --color-on-surface:           #152033;
      --color-on-surface-variant:   #637089;
      /* === 功能色 === */
      --color-success:  #16A37B;
      --color-error:    #E5484D;
      --color-warning:  #F59E0B;
      /* === 边框 === */
      --color-outline:          #D0D6E0;
      --color-outline-variant:  #E6EAF2;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.10);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: "Inter", "PingFang SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段 -->
  <!-- ===== 顶部导航栏 ===== -->
  <header class="bg-surface border-b border-outline-variant/20 sticky top-0 z-40 h-14 flex items-center justify-between px-5">
    <div class="flex items-center gap-3">
      <i data-lucide="layout-dashboard" class="w-5 h-5 text-primary"></i>
      <span class="font-semibold text-base text-on-surface">搭建器</span>
    </div>
    <nav class="flex items-center gap-1">
      <a href="builder.html" class="flex items-center gap-1.5 px-3.5 py-2 text-sm font-medium rounded-md transition-colors"
         id="tab-builder">
        <i data-lucide="layers" class="w-4 h-4"></i>页面设计
      </a>
      <a href="theme.html" class="flex items-center gap-1.5 px-3.5 py-2 text-sm font-medium rounded-md transition-colors"
         id="tab-theme">
        <i data-lucide="palette" class="w-4 h-4"></i>主题配置
      </a>
    </nav>
    <div class="flex items-center gap-2">
      <span class="w-7 h-7 rounded-full bg-primary/10 text-primary text-xs font-medium flex items-center justify-center">初</span>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 3.5rem)">
    <!-- ===== 左侧边栏 ===== -->
    <aside class="w-56 shrink-0 bg-surface border-r border-outline-variant/20 overflow-y-auto flex flex-col">
      <!-- 侧边栏菜单由子 Agent 根据页面填充具体内容 -->
      <div class="p-3 space-y-0.5 flex-1" id="sidebar-content">
        <!-- 子 Agent 在此填充该页面的侧边栏菜单项 -->
        <div class="text-xs text-on-surface-variant/60 font-medium px-3 py-2 uppercase tracking-wider" id="sidebar-section-title">菜单</div>
      </div>
    </aside>

    <!-- @main-content:start -->
    <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
      <!-- 子 Agent 在此填充页面内容 -->
    </main>
    <!-- @main-content:end -->
  </div>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <script>lucide.createIcons();</script>
</body>

</html>
